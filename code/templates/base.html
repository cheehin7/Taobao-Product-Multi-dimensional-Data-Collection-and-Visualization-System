<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
    <title>基于Python的商品评论数据采集与分析系统</title>

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../static/css/bootstrap.css">

    <link rel="stylesheet" href="../static/vendors/iconly/bold.css">
    <link href="https://unpkg.com/filepond/dist/filepond.css" rel="stylesheet">
    <link rel="stylesheet" href="../static/vendors/perfect-scrollbar/perfect-scrollbar.css">
    <link rel="stylesheet" href="../static/vendors/bootstrap-icons/bootstrap-icons.css">
    <link rel="stylesheet" href="../static/css/app.css">
    <link rel="shortcut icon" href="../static/images/favicon.svg" type="image/x-icon">
    <script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
</head>

<body>
<div id="app">
    <div id="sidebar" class="active">
        <div class="sidebar-wrapper active">
            <div class="sidebar-header">
                <div class="d-flex justify-content-between">
                    <div class="toggler">
                        <a href="#" class="sidebar-hide d-xl-none d-block"><i class="bi bi-x bi-middle"></i></a>
                    </div>
                </div>
            </div>
            <div class="sidebar-menu">
                <ul class="menu">
                    <li class="sidebar-item  ">
                        <a href="index" class='sidebar-link'>
                            <i class="bi bi-grid-fill"></i>
                            <span>系统首页</span>
                        </a>
                    </li>

                    <li class="sidebar-item  ">
                        <a href="crawler" class='sidebar-link'>
                            <i class="bi bi-cloud-download-fill"></i>
                            <span>数据爬取</span>
                        </a>
                    </li>

                    <li class="sidebar-item  has-sub">
                        <a href="#" class='sidebar-link'>
                            <i class="bi bi-bar-chart-fill"></i>
                            <span>数据可视化</span>
                        </a>
                        <ul class="submenu ">
                            <li class="submenu-item ">
                                <a href="/visualization_price">价格分布</a>
                            </li>
                            <li class="submenu-item ">
                                <a href="/visualization_xiaoliang">销量排行</a>
                            </li>
                            <li class="submenu-item ">
                                <a href="/visualization_location">地区分布</a>
                            </li>
                            <li class="submenu-item ">
                                <a href="/visualization_baoyou">包邮比例</a>
                            </li>
                        </ul>
                    </li>

                    <li class="sidebar-item  has-sub">
                        <a href="#" class='sidebar-link'>
                            <i class="bi bi-chat-quote-fill"></i>
                            <span>评论分析</span>
                        </a>
                        <ul class="submenu ">
                            <li class="submenu-item ">
                                <a href="/comment_wordcloud">评论词云分析</a>
                            </li>
                            <li class="submenu-item ">
                                <a href="/comment_sentiment">NLP情感分析</a>
                            </li>
                            <li class="submenu-item ">
                                <a href="/comment_lda">LDA主题分析</a>
                            </li>
                            <li class="submenu-item ">
                                <a href="/comment_bayes">Bayes评论分类</a>
                            </li>
                        </ul>
                    </li>
                    
                    {% if session.get('role') == 'admin' %}
                    <li class="sidebar-item">
                        <a href="/user_management" class='sidebar-link'>
                            <i class="bi bi-people-fill"></i>
                            <span>用户管理</span>
                        </a>
                    </li>
                    {% endif %}

                    <li class="sidebar-item">
                        <a href="#" class='sidebar-link' onclick="clearDatabase()">
                            <i class="bi bi-trash-fill"></i>
                            <span>清除数据库</span>
                        </a>
                    </li>

                    <li class="sidebar-item  ">
                        <a href="/logout" class='sidebar-link'>
                            <i class="bi bi-box-arrow-right"></i>
                            <span>退出登录</span>
                        </a>
                    </li>
                </ul>
            </div>
            <button class="sidebar-toggler btn x"><i data-feather="x"></i></button>
        </div>
    </div>
    <div id="main">
        {% block page %}
        {% endblock %}
    </div>
</div>

<script>
    function clearDatabase() {
        if (confirm('确定要清除所有数据吗？此操作不可恢复！')) {
            $.ajax({
                url: '/clear_database',
                type: 'POST',
                success: function(response) {
                    if (response.success) {
                        alert('数据库已成功清除！');
                        location.reload();
                    } else {
                        alert('清除数据库失败：' + response.message);
                    }
                },
                error: function() {
                    alert('请求失败，请稍后重试');
                }
            });
        }
    }
</script>

<script src="../static/vendors/perfect-scrollbar/perfect-scrollbar.min.js"></script>
<script src="../static/js/bootstrap.bundle.min.js"></script>
<script src="../static/vendors/apexcharts/apexcharts.js"></script>
<script src="../static/js/pages/dashboard.js"></script>
<script src="../static/js/main.js"></script>
</body>
</html>
