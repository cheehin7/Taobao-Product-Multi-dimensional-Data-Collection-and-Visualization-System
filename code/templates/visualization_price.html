{% extends 'base.html' %}
{% block page %}
    <div class="page-title">
        <div class="row">
            <div class="col-12 col-md-6 order-md-1 order-last">
                <h3>商品价格分布分析</h3>
                <p class="text-subtitle text-muted">淘宝商品价格区间统计分析</p>
            </div>
            <div class="col-12 col-md-6 order-md-2 order-first">
                <nav aria-label="breadcrumb" class="breadcrumb-header">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="/index">首页</a></li>
                        <li class="breadcrumb-item"><a href="/visualization">数据可视化</a></li>
                        <li class="breadcrumb-item active" aria-current="page">价格分布</li>
                    </ol>
                </nav>
            </div>
        </div>
    </div>

    <section class="section">
        <div class="row">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header">
                        <h4 class="card-title">商品价格分布</h4>
                    </div>
                    <div class="card-body">
                        <div id="priceChart" style="height: 450px;"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header">
                        <h4 class="card-title">价格分布详细数据</h4>
                    </div>
                    <div class="card-body">
                        <div id="priceChartDetail" style="height: 350px;"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 确保引入ECharts库 -->
    <script src="../static/vendors/echarts/echarts.min.js"></script>

    <script>
        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', function() {
            // 初始化图表
            var priceChart = echarts.init(document.getElementById('priceChart'));
            var priceChartDetail = echarts.init(document.getElementById('priceChartDetail'));
            
            // 先显示加载中
            priceChart.showLoading();
            priceChartDetail.showLoading();
            
            // 从API获取数据
            fetch('/api/visualization_data?type=price')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('网络响应不正常');
                    }
                    return response.json();
                })
                .then(data => {
                    // 隐藏加载
                    priceChart.hideLoading();
                    priceChartDetail.hideLoading();
                    
                    // 配置价格分布图表
                    var priceOption = {
                        title: {
                            text: '商品价格分布'
                        },
                        tooltip: {
                            trigger: 'axis',
                            axisPointer: {
                                type: 'shadow'
                            }
                        },
                        xAxis: {
                            type: 'category',
                            data: data.price_ranges,
                            name: '价格区间'
                        },
                        yAxis: {
                            type: 'value',
                            name: '商品数量'
                        },
                        series: [{
                            data: data.price_counts,
                            type: 'bar',
                            itemStyle: {
                                color: function(params) {
                                    // 不同价格区间使用不同的颜色
                                    var colorList = [
                                        '#5470c6', '#91cc75', '#fac858', 
                                        '#ee6666', '#73c0de', '#3ba272'
                                    ];
                                    return colorList[params.dataIndex];
                                }
                            },
                            label: {
                                show: true,
                                position: 'top',
                                formatter: '{c}个'
                            }
                        }]
                    };
                    
                    // 使用配置项设置图表
                    priceChart.setOption(priceOption);
                    
                    // 创建更详细的价格分布图表
                    var priceDetailOption = {
                        title: {
                            text: '价格分布统计'
                        },
                        tooltip: {
                            trigger: 'item'
                        },
                        legend: {
                            top: '5%',
                            left: 'center'
                        },
                        series: [
                            {
                                name: '价格区间',
                                type: 'pie',
                                radius: ['40%', '70%'],
                                avoidLabelOverlap: false,
                                itemStyle: {
                                    borderRadius: 10,
                                    borderColor: '#fff',
                                    borderWidth: 2
                                },
                                label: {
                                    show: true,
                                    formatter: '{b}: {c}个 ({d}%)'
                                },
                                data: data.price_ranges.map((range, index) => {
                                    return {
                                        name: range,
                                        value: data.price_counts[index]
                                    };
                                })
                            }
                        ]
                    };
                    
                    priceChartDetail.setOption(priceDetailOption);
                    
                    // 窗口大小改变时，重新调整图表大小
                    window.addEventListener('resize', function() {
                        priceChart.resize();
                        priceChartDetail.resize();
                    });
                })
                .catch(error => {
                    console.error('获取数据失败:', error);
                    // 隐藏加载
                    priceChart.hideLoading();
                    priceChartDetail.hideLoading();
                    
                    // 显示错误信息
                    alert('获取数据失败: ' + error.message);
                });
        });
    </script>
{% endblock %}
