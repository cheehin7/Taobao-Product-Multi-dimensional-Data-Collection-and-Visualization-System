{% extends 'base.html' %}

{% block page %}
<div class="page-heading">
    <div class="page-title">
        <div class="row">
            <div class="col-12 text-center">
                <div class="error-page">
                    <h1 class="error-code" style="font-size: 8rem; color: #5A8DEE;">404</h1>
                    <h2 class="error-title my-4">页面未找到</h2>
                    <p class="error-description mb-4">
                        {% if message %}
                            {{ message }}
                        {% else %}
                            抱歉，您访问的页面不存在或已被移除。
                        {% endif %}
                    </p>
                    <div class="text-center mt-5">
                        <a href="/index" class="btn btn-primary btn-lg">
                            <i class="bi bi-house-door"></i> 返回首页
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .error-page {
        padding: 80px 20px;
    }
    
    .error-code {
        color: #5A8DEE;
        font-weight: 600;
        text-shadow: 2px 2px 5px rgba(0,0,0,0.1);
    }
    
    .error-title {
        font-size: 2rem;
        color: #333;
    }
    
    .error-description {
        font-size: 1.2rem;
        color: #666;
        max-width: 600px;
        margin: 0 auto;
    }
</style>
{% endblock %}
