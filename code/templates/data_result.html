{% extends "base.html" %}

{% block title %}淘宝商品数据结果{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h4 class="card-title">淘宝商品数据结果</h4>
                    <div>
                        <a href="/index" class="btn btn-secondary">返回首页</a>
                        <a href="/crawler" class="btn btn-primary">返回爬取页面</a>
                    </div>
                </div>
                <div class="card-body">
                    <div class="row mb-4">
                        <div class="col-md-12">
                            <div class="input-group">
                                <input type="text" id="searchKeyword" class="form-control" placeholder="输入商品标题关键词">
                                <div class="input-group-append">
                                    <button class="btn btn-primary" type="button" id="btnSearch">搜索</button>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-12">
                            <div class="table-responsive">
                                <table class="table table-striped table-hover" id="goodsTable">
                                    <thead>
                                        <tr>
                                            <th>ID</th>
                                            <th>商品标题</th>
                                            <th>价格</th>
                                            <th>成交量</th>
                                            <th>是否包邮</th>
                                            <th>商家名称</th>
                                            <th>店铺所在地</th>
                                            <th>链接</th>
                                            <th>爬取时间</th>
                                        </tr>
                                    </thead>
                                    <tbody id="goodsList">
                                        <!-- 商品数据会动态加载到这里 -->
                                    </tbody>
                                </table>
                                <div id="noData" class="text-center py-4" style="display:none;">
                                    <p class="text-muted">暂无数据</p>
                                </div>
                                <div id="loading" class="text-center py-4" style="display:none;">
                                    <div class="spinner-border text-primary" role="status">
                                        <span class="sr-only">加载中...</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    $(document).ready(function() {
        // 加载商品数据
        function loadGoods(keyword = '') {
            $('#loading').show();
            $('#goodsList').empty();
            $('#noData').hide();
            
            let url = '/api/goods';
            if (keyword) {
                url += '?keyword=' + encodeURIComponent(keyword);
            }
            
            $.ajax({
                url: url,
                type: 'GET',
                success: function(data) {
                    $('#loading').hide();
                    
                    if (data.goods && data.goods.length > 0) {
                        data.goods.forEach(function(item) {
                            const row = `
                                <tr>
                                    <td>${item.id}</td>
                                    <td>${item.title}</td>
                                    <td>${item.price}</td>
                                    <td>${item.deal_count}</td>
                                    <td>${item.free_shipping}</td>
                                    <td>${item.shop_name}</td>
                                    <td>${item.location}</td>
                                    <td>
                                        <a href="${item.product_link}" target="_blank" class="btn btn-sm btn-info">商品链接</a>
                                        <a href="${item.shop_link}" target="_blank" class="btn btn-sm btn-secondary">店铺链接</a>
                                    </td>
                                    <td>${item.fetch_time}</td>
                                </tr>
                            `;
                            $('#goodsList').append(row);
                        });
                    } else {
                        $('#noData').show();
                    }
                },
                error: function(xhr, status, error) {
                    $('#loading').hide();
                    $('#noData').show();
                    console.error('获取商品数据失败:', error);
                    alert('获取商品数据失败: ' + error);
                }
            });
        }
        
        // 初始加载
        loadGoods();
        
        // 搜索按钮点击事件
        $('#btnSearch').click(function() {
            const keyword = $('#searchKeyword').val().trim();
            loadGoods(keyword);
        });
        
        // 回车键搜索
        $('#searchKeyword').keypress(function(e) {
            if (e.which === 13) {
                const keyword = $('#searchKeyword').val().trim();
                loadGoods(keyword);
            }
        });
    });
</script>
{% endblock %}
